<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>まねーもの空</title>
    <style>
        :root {
            --sky-gradient: linear-gradient(to bottom, #4fc3f7, #e0f7fa);
            --text-color: #2c3e50;
            --main-color: #4fc3f7; 
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--sky-gradient);
            height: 100vh;
            display: flex;
            flex-direction: column; 
            justify-content: space-between;
            overflow: hidden;
            transition: background 1s ease;
        }

        /* 上部メニューエリア */
        .top-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        .menu-grid-row {
            display: grid;
            grid-template-columns: 44px 1fr; 
            gap: 12px;
            align-items: center;
        }

        .menu-btn {
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.7);
            color: #2c3e50;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-align: left; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        .menu-btn:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.9); }
        
        .icon-btn-menu {
            width: 40px; height: 40px; padding: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; border-radius: 12px; text-align: center;
        }
        .back-ledger-btn { background: rgba(47, 54, 64, 0.15); }
        .music-playing { background: #ff80ab !important; border-color: #ff4081 !important; }

        .name-display-container { display: flex; gap: 8px; align-items: center; width: 100%; }
        .name-display-container div { font-size: 14px; color: #2c3e50; font-weight: bold; }

        /* ステージ */
        .stage { flex: 1; width: 100%; position: relative; touch-action: none; }

        /* ペットのコンテナ */
        .ameba-pet {
            width: 150px; height: 150px; 
            background: rgba(255, 255, 255, 0.85);
            border: 4px solid var(--main-color); 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            border-radius: 50%; 
            position: absolute; left: calc(50% - 75px); top: calc(50% - 75px);
            display: flex; justify-content: center; align-items: center;
            user-select: none; cursor: pointer; z-index: 5;
            overflow: hidden; 
            outline: none;
            transition: top 1.5s ease-in-out, left 1.5s ease-in-out, transform 0.5s ease;
        }
        .pet-moving { animation: floaty 3s ease-in-out infinite alternate; }
        .pet-face { font-size: 32px; color: #4a5568; user-select: none; pointer-events: none; }
        
        /* イラスト表示用エリア */
        .pet-image-container { width: 100%; height: 100%; position: relative; display: none; }
        .pet-image { width: 100%; height: 100%; object-fit: cover; }

        /* 👁️ 瞬きエフェクト */
        .eyelids { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; pointer-events: none; z-index: 6; }
        .blink-animation { animation: blink-eyes 5s infinite ease-in-out; }

        @keyframes blink-eyes {
            0%, 90%, 94%, 100% { clip-path: inset(0% 0% 100% 0%); }
            92%, 96% {
                background: rgba(255, 255, 255, 0.95);
                clip-path: inset(35% 0% 45% 0%);
                border-bottom: 3px solid #4a5568;
            }
        }

        .pet-follow-mode { box-shadow: 0 10px 25px rgba(255, 255, 255, 0.8); }

        @keyframes floaty { 0% { transform: translateY(0px) rotate(0deg); } 100% { transform: translateY(-15px) rotate(2deg); } }

        /* 📺 YouTubeプレイヤーのポップアップスタイル */
        .youtube-panel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 400px; background: white; border-radius: 16px; padding: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 100;
        }
        .youtube-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: bold; font-size: 13px; color: #2c3e50; }
        .youtube-close-btn { background: #e0e0e0; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 11px; }
        .iframe-container { position: relative; width: 100%; padding-top: 56.25%; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; border-radius: 8px; }

        /* 下部エリア */
        .bottom-cloud-area {
            position: relative; width: 100%; padding-bottom: 24px;
            display: flex; flex-direction: column; align-items: center;
            transition: transform 0.3s ease, opacity 0.3s ease; z-index: 10;
        }
        .cloud-box {
            width: 90%; max-width: 500px; background: rgba(255, 255, 255, 0.95);
            border-radius: 30px; padding: 20px; box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; margin-bottom: 12px;
        }
        .cloud-box::before { content: ''; position: absolute; top: -15px; left: 30px; width: 40px; height: 40px; background: rgba(255, 255, 255, 0.95); border-radius: 50%; }
        .pet-speech { font-size: 14px; line-height: 1.5; color: #2c3e50; min-height: 42px; }

        .input-row { width: 90%; max-width: 500px; display: flex; gap: 8px; }
        .chat-input { flex: 1; border: none; padding: 12px 16px; border-radius: 20px; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); outline: none; }

        .icon-btn {
            background: white; border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 18px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .icon-btn:active { transform: scale(0.9); }
        #cancelWatchArea { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <div id="cancelWatchArea" onclick="endWatchMode()"></div>

    <div class="top-menu" id="topMenu">
        <div class="menu-grid-row">
            <button class="menu-btn icon-btn-menu back-ledger-btn" onclick="goToLedger()">📓</button>
            <div class="name-display-container">
                <div id="petNameLabel">なまえ: もっちー</div>
            </div>
        </div>

        <div class="menu-grid-row">
            <button class="menu-btn icon-btn-menu" id="musicBtn" onclick="toggleYouTubePanel()">🎵</button>
            <button class="menu-btn" onclick="startWatchMode()">☁️ ながめるモードを起動</button>
        </div>

        <div class="menu-grid-row">
            <button class="menu-btn icon-btn-menu" onclick="resetPet()">⸌⍤⃝⸍</button>
            <button class="menu-btn" onclick="transformPet()">🎨 イラストを入力して1日1回変身！</button>
        </div>

        <div class="menu-grid-row">
            <div style="width: 40px;"></div>
            <div style="font-size: 11px; color:#2c3e50; font-weight:bold; padding-left:4px;" id="transformStatus">今日の変身はまだしてないもんも！</div>
        </div>
    </div>

    <!-- 📺 YouTubeプレイヤーのポップアップ枠 -->
    <div class="youtube-panel" id="youtubePanel">
        <div class="youtube-panel-header">
            <span>まねものお気に入りBGM🎧</span>
            <button class="youtube-close-btn" onclick="toggleYouTubePanel()">✕</button>
        </div>
        <div class="iframe-container">
            <iframe id="youtubeIframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <div class="stage" id="petStage">
        <div class="ameba-pet pet-moving" id="myPet">
            <div class="pet-image-container" id="petImgContainer">
                <img src="" class="pet-image" id="petImg" alt="まねもの姿">
                <div class="eyelids blink-animation" id="petEyelids"></div>
            </div>
            <div class="pet-face" id="petFace">•ᴗ•</div>
        </div>
    </div>

    <div class="bottom-cloud-area" id="bottomCloudArea">
        <div class="cloud-box">
            <div class="pet-speech" id="speechBubble">
                <span id="initialText"></span>
            </div>
        </div>

        <div class="input-row">
            <input type="text" class="chat-input" id="petInput" placeholder="お話しや、なりたい姿のイラストを入力してね...">
            <button class="icon-btn" onclick="sendToPet()">🕊️</button>
            <button class="icon-btn" id="micBtn" onclick="toggleSpeechRecognition()">🎤</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyIWeWtEPx4j1BOUczqao1tUPuVR2pgtY",
            authDomain: "moneymo-3c572.firebaseapp.com",
            databaseURL: "https://moneymo-3c572-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "moneymo-3c572",
            storageBucket: "moneymo-3c572.firebasestorage.app",
            messagingSenderId: "1040579264053",
            appId: "1:1040579264053:web:d3de60f3e7438c44aa3b7c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 🌟 1. 【製作者設定】GeminiのAPIキーをここに直接貼り付けてください！
        let geminiApiKey = "ここにあなたのAPIキーを貼り付けてください";

        // 🌟 2. 【製作者設定】まねもののなまえ・性格
        let petName = "もっちー";
        let petProfile = "のんびり屋で、語尾に「〜もんも」や「〜も」をつけるかわいい生命体。お小遣いの使いすぎをいつも心配してくれる優しい性格。";
        let userName = "飼い主さん";

        // 🌟 3. 【製作者設定】YouTubeの動画ID、またはプレイリストID
        let youtubeVideoId = "dQw4w9WgXcQ"; // お好きな動画のID（動画URLの v=◯◯ の部分）
        let youtubePlaylistId = "";        // プレイリストの場合は「PL...」から始まるIDを入力（なければ空欄でOK）

        let currentNormalImage = "";
        let currentSleepImage = "";
        let isYoutubeOpen = false;

        database.ref('pet_data').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.petName) { petName = data.petName; }
            document.getElementById('petNameLabel').innerText = `なまえ: ${petName}`;
            updateInitialSpeech();
        });

        function loadLocalSettings() {
            currentNormalImage = localStorage.getItem('currentNormalImage') || "";
            currentSleepImage = localStorage.getItem('currentSleepImage') || "";
            checkTransformLimit();
            updateSkyByTime(); 
        }

        function updateInitialSpeech() {
            document.getElementById('initialText').innerText = `${petName}はどんな姿にでもなれる不思議な生命体だもんも。夜21時〜朝6時はスヤスヤ眠るも！[source: 5]`;
        }

        function goToLedger() { window.location.href = "index.html"; }

        // 背景・時間連動
        function updateSkyByTime() {
            const hour = new Date().getHours();
            const body = document.body;
            const petImgContainer = document.getElementById('petImgContainer');
            const petImg = document.getElementById('petImg');
            const petFace = document.getElementById('petFace');
            const eyelids = document.getElementById('petEyelids');
            
            let gradient, edgeColor, isNight = false;

            if (hour >= 21 || hour < 6) {
                gradient = "linear-gradient(to bottom, #0d1b2a, #1b263b, #415a77)"; edgeColor = "#415a77"; isNight = true; 
            } else if (hour >= 6 && hour < 8) {
                gradient = "linear-gradient(to bottom, #ffb199, #ffe5d9, #e0f7fa)"; edgeColor = "#ffb199";
            } else if (hour >= 8 && hour < 16) {
                gradient = "linear-gradient(to bottom, #4fc3f7, #b3e5fc, #e0f7fa)"; edgeColor = "#4fc3f7";
            } else {
                gradient = "linear-gradient(to bottom, #f4511e, #ffb300, #ffe082)"; edgeColor = "#f4511e";
            }

            body.style.background = gradient;
            document.documentElement.style.setProperty('--main-color', edgeColor);

            if (isNight && currentSleepImage) {
                petImg.src = currentSleepImage; petImgContainer.style.display = "block"; petFace.style.display = "none";
                eyelids.classList.remove('blink-animation'); 
            } else if (!isNight && currentNormalImage) {
                petImg.src = currentNormalImage; petImgContainer.style.display = "block"; petFace.style.display = "none";
                eyelids.classList.add('blink-animation'); 
            } else {
                petImgContainer.style.display = "none"; petFace.style.display = "block";
                petFace.innerText = isNight ? "💤" : "•ᴗ•";
            }
        }
        setInterval(updateSkyByTime, 60000);

        // 🎬 YouTubeプレイヤーの表示・非表示切り替え
        function toggleYouTubePanel() {
            const panel = document.getElementById('youtubePanel');
            const iframe = document.getElementById('youtubeIframe');
            const btn = document.getElementById('musicBtn');

            if (isYoutubeOpen) {
                panel.style.display = "none";
                iframe.src = ""; // 閉じたら再生をストップする
                btn.classList.remove('music-playing');
                isYoutubeOpen = false;
            } else {
                panel.style.display = "block";
                btn.classList.add('music-playing');
                
                // 動画かプレイリストかでURLの形式を自動で切り替える
                if (youtubePlaylistId) {
                    iframe.src = `https://www.youtube.com/embed/?listType=playlist&list=${youtubePlaylistId}&autoplay=1`;
                } else {
                    iframe.src = `https://www.youtube.com/embed/${youtubeVideoId}?autoplay=1`;
                }
                isYoutubeOpen = true;
            }
        }

        // AIトーク
        async function sendToPet() {
            const inputElement = document.getElementById('petInput');
            const userText = inputElement.value.trim();
            if (!userText) return;
            inputElement.value = "";

            document.getElementById('speechBubble').innerText = "考え中だもんも...💬";

            if (!geminiApiKey || geminiApiKey.includes("ここにあなたのAPIキー")) {
                document.getElementById('speechBubble').innerText = "コード内にGemini APIキーを設定してね！";
                return;
            }

            const prompt = `あなたは以下のプロフィールを持ったペット生命体「${petName}」として、飼い主の「${userName}」とおしゃべりしてください。\nプロフィール: ${petProfile}\n飼い主: "${userText}"\n短くキャラクターらしい楽しい返答をしてください。`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiApiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const aiReply = data.candidates[0].content.parts[0].text;
                document.getElementById('speechBubble').innerText = aiReply;
            } catch (error) {
                document.getElementById('speechBubble').innerText = "うまくお話しできないもんも。キーを確かめてね！";
            }
        }

        // 変身制限チェック
        function checkTransformLimit() {
            const lastDate = localStorage.getItem('lastTransformDate');
            const todayStr = new Date().toISOString().split('T')[0];
            if (lastDate === todayStr) {
                document.getElementById('transformStatus').innerText = "今日の変身パワーは使い果たしたもんも！";
                return false;
            }
            document.getElementById('transformStatus').innerText = "今日の変身はまだしてないもんも！";
            return true;
        }

        async function generateAndSaveImage(promptText, storageKey) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateImages?key=${geminiApiKey}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prompt: promptText,
                    numberOfImages: 1,
                    outputMimeType: "image/jpeg",
                    aspectRatio: "1:1"
                })
            });
            const data = await response.json();
            const base64ImageBytes = data.generatedImages[0].image.imageBytes;
            return `data:image/jpeg;base64,${base64ImageBytes}`;
        }

        async function transformPet() {
            const userText = document.getElementById('petInput').value.trim();
            if (!userText) { alert("下の入力欄になりたい姿を入力してね！"); return; }
            if (!checkTransformLimit()) { alert("AI変身は1日1回限定だもんも！[source: 5]"); return; }
            if (!geminiApiKey || geminiApiKey.includes("ここにあなたのAPIキー")) { alert("コード内にAPIキーを設定してね！"); return; }

            document.getElementById('speechBubble').innerText = "AIがお着替え用とおやすみ用イラストを同時にお絵描き中だもんも…🎨";

            try {
                const normalPrompt = `A cute, charming, standalone digital character illustration of: ${userText}. Facing forward, clear eyes open, white background, single character style, asset design.`;
                const sleepPrompt = `A cute digital character illustration of: ${userText} sleeping peacefully. Eyes closed, curled up, dreaming, white background, asset design.`;

                const [normalImgData, sleepImgData] = await Promise.all([
                    generateAndSaveImage(normalPrompt, 'currentNormalImage'),
                    generateAndSaveImage(sleepPrompt, 'currentSleepImage')
                ]);

                currentNormalImage = normalImgData;
                currentSleepImage = sleepImgData;
                localStorage.setItem('currentNormalImage', normalImgData);
                localStorage.setItem('currentSleepImage', sleepImgData);

                updateSkyByTime();
                document.getElementById('speechBubble').innerText = `「${userText}」に完全変身したもんもーー！夜21時になると自動で眠りにつくも！`;

                const todayStr = new Date().toISOString().split('T')[0];
                localStorage.setItem('lastTransformDate', todayStr);
                checkTransformLimit();
                document.getElementById('petInput').value = "";

            } catch (error) {
                console.error(error);
                document.getElementById('speechBubble').innerText = "お絵描きに失敗しちゃったもんも。もう一度試してみてね。";
            }
        }

        function resetPet() {
            localStorage.removeItem('currentNormalImage'); localStorage.removeItem('currentSleepImage');
            currentNormalImage = ""; currentSleepImage = "";
            updateSkyByTime();
            document.getElementById('speechBubble').innerText = `${petName}はいつものアメーバの姿にもどったも。`;
        }

        // 音声認識
        let recognition;
        function toggleSpeechRecognition() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!window.SpeechRecognition) { alert("マイクに対応してないも…"); return; }
            if (!recognition) {
                recognition = new SpeechRecognition(); recognition.lang = 'ja-JP';
                recognition.onstart = () => { document.getElementById('micBtn').style.background = '#ff8a80'; };
                recognition.onresult = (event) => { document.getElementById('petInput').value = event.results[0][0].transcript; };
                recognition.onend = () => { document.getElementById('micBtn').style.background = 'white'; recognition = null; };
                recognition.start();
            }
        }

        // ながめるモード
        function startWatchMode() {
            document.getElementById('topMenu').style.opacity = '0'; document.getElementById('topMenu').style.pointerEvents = 'none';
            document.getElementById('bottomCloudArea').style.opacity = '0'; document.getElementById('bottomCloudArea').style.transform = 'translateY(120px)';
            document.getElementById('cancelWatchArea').style.display = 'block';
        }
        function endWatchMode() {
            document.getElementById('topMenu').style.opacity = '1'; document.getElementById('topMenu').style.pointerEvents = 'auto';
            document.getElementById('bottomCloudArea').style.opacity = '1'; document.getElementById('bottomCloudArea').style.transform = 'translateY(0)';
            document.getElementById('cancelWatchArea').style.display = 'none';
        }

        // タッチ移動
        const stage = document.getElementById('petStage'); const pet = document.getElementById('myPet');
        let longPressTimer = null; let isLongPressing = false;
        function getCoords(e) {
            const rect = stage.getBoundingClientRect();
            let clientX = e.clientX, clientY = e.clientY;
            if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
            return { x: clientX - rect.left, y: clientY - rect.top };
        }
        pet.addEventListener('click', (e) => { e.stopPropagation(); if (isLongPressing) return; monyoRandomMove(); });
        function monyoRandomMove() {
            const randomLeft = Math.floor(Math.random() * 50) + 20; const randomTop = Math.floor(Math.random() * 40) + 20;
            pet.style.left = `${randomLeft}%`; pet.style.top = `${randomTop}%`;
            const replies = [`ふわふわ〜。移動するも〜。`, `こっちの景色もいいも！`, `なでなでしてほしいも？`];
            document.getElementById('speechBubble').innerText = replies[Math.floor(Math.random() * replies.length)];
        }
        function handleStart(e) {
            isLongPressing = false; const coords = getCoords(e);
            longPressTimer = setTimeout(() => { isLongPressing = true; pet.classList.add('pet-follow-mode'); moveToCoords(coords.x, coords.y); }, 300);
        }
        function handleMove(e) { if (!isLongPressing) return; const coords = getCoords(e); moveToCoords(coords.x, coords.y); }
        function handleEnd() { clearTimeout(longPressTimer); if (isLongPressing) { isLongPressing = false; pet.classList.remove('pet-follow-mode'); } }
        function moveToCoords(x, y) { pet.style.left = `${x - 75}px`; pet.style.top = `${y - 75}px`; }

        stage.addEventListener('mousedown', handleStart); stage.addEventListener('mousemove', handleMove); window.addEventListener('mouseup', handleEnd);
        stage.addEventListener('touchstart', handleStart, { passive: true }); stage.addEventListener('touchmove', handleMove, { passive: true }); window.addEventListener('touchend', handleEnd);

        loadLocalSettings();
    </script>
</body>
</html>
