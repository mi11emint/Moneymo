<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - まねーも</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --main-color: #4fc3f7; 
            --bg-gradient: linear-gradient(to bottom, #4fc3f7, #e0f7fa);
            --text-color: #2c3e50;
        }

        body {
            margin: 0; padding: 20px 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 24px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { font-size: 20px; margin-bottom: 24px; font-weight: bold; }
        h2 { font-size: 15px; margin-top: 0; margin-bottom: 16px; color: #555; }

        .input-group {
            text-align: left;
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 6px;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            background: #f9f9f9;
        }
        input:focus, select:focus {
            border-color: var(--main-color);
            background: #fff;
        }

        .select-row {
            display: flex;
            gap: 8px;
        }
        .select-row select {
            flex: 1;
        }

        .color-picker-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-top: 6px;
        }
        .color-circle {
            width: 60%;
            margin: 0 auto;
            aspect-ratio: 1;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s, border-color 0.2s;
        }
        .color-circle:active {
            transform: scale(0.9);
        }
        .color-circle.selected {
            border-color: #2c3e50;
            transform: scale(1.05);
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
        }

        .hint-text {
            font-size: 11px;
            color: #777;
            margin-top: 4px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            color: white;
            background-color: var(--main-color);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(79, 195, 247, 0.3);
        }
        .btn:active { transform: scale(0.98); }

        .btn-secondary {
            background-color: transparent;
            color: var(--main-color);
            border: 1px solid var(--main-color);
            box-shadow: none;
            margin-top: 12px;
        }

        .toggle-link {
            font-size: 13px;
            color: var(--main-color);
            text-decoration: underline;
            cursor: pointer;
            display: inline-block;
            margin-top: 16px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="login-container" id="loginBox">
        <h1>まねーも</h1>
        
        <div class="input-group">
            <label for="loginName">ニックネーム</label>
            <input type="text" id="loginName" placeholder="登録したなまえ">
        </div>

        <div class="input-group">
            <label for="loginPassword">あいことば（ひらがな）</label>
            <input type="password" id="loginPassword" placeholder="ひらがなでいれてね" oninput="validateHiragana(this)">
        </div>

        <button class="btn" onclick="login()">ログインする 🔑</button>
        
        <div>
            <span class="toggle-link" onclick="showBox('registerBox')">はじめてつかう（新しく登録）</span>
        </div>
        <div>
            <span class="toggle-link" onclick="showBox('forgotBox')">あいことばをわすれたとき</span>
        </div>
    </div>


    <div class="login-container hidden" id="registerBox">
        <h1>新しくあいことばをきめる</h1>
        
        <div class="input-group">
            <label for="regName">ニックネーム</label>
            <input type="text" id="regName" placeholder="あなたのなまえ">
        </div>

        <div class="input-group">
            <label for="regPassword">あいことば（ひらがなのみ10文字以内）</label>
            <input type="text" id="regPassword" placeholder="例：ひみつのぱす" oninput="validateHiragana(this)">
            <div class="hint-text">※ひらがなだけで10文字までだよ（濁音もOK！）</div>
        </div>

        <hr style="border: 0; border-top: 1px dashed #ccc; margin: 20px 0;">
        <h2>わすれたときのための質問</h2>

        <div class="input-group">
            <label>① 誕生日は？</label>
            <div class="select-row">
                <select id="regMonth"></select>
                <select id="regDay"></select>
            </div>
        </div>

        <div class="input-group">
            <label>② 好きな色は？</label>
            <div class="color-picker-grid" id="regColorGrid"></div>
        </div>

        <button class="btn" onclick="register()">これで登録する ✨</button>
        <button class="btn btn-secondary" onclick="showBox('loginBox')">もどる</button>
    </div>


    <div class="login-container hidden" id="forgotBox">
        <h1>あいことばの確認</h1>
        <p style="font-size: 13px; color: #555;">登録したニックネームと、質問にこたえてね</p>
        
        <div class="input-group">
            <label for="forgotName">ニックネーム</label>
            <input type="text" id="forgotName" placeholder="あなたのなまえ">
        </div>

        <div class="input-group">
            <label>① 誕生日は？</label>
            <div class="select-row">
                <select id="forgotMonth"></select>
                <select id="forgotDay"></select>
            </div>
        </div>

        <div class="input-group">
            <label>② 好きな色は？</label>
            <div class="color-picker-grid" id="forgotColorGrid"></div>
        </div>

        <button class="btn" onclick="checkAnswers()">合言葉をチェックする 🔍</button>
        <button class="btn btn-secondary" onclick="showBox('loginBox')">もどる</button>
    </div>

    <script>
        // Firebaseの設定
        const firebaseConfig = {
            apiKey: "AIzaSyCyIWeWtEPx4j1BOUczqao1tUPuVR2pgtY",
            authDomain: "moneymo-3c572.firebaseapp.com",
            databaseURL: "https://moneymo-3c572-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "moneymo-3c572",
            storageBucket: "moneymo-3c572.firebasestorage.app",
            messagingSenderId: "1040579264053",
            appId: "1:1040579264053:web:d3de60f3e7438c44aa3b7c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // ニックネームを擬似メールアドレスに変換
        function convertToEmail(name) {
            return encodeURIComponent(name) + "@moneymo.internal";
        }

        // ひらがなパスワードを最強英数字記号に変換
        function convertToStrongPassword(hiraganaPassword) {
            return btoa(encodeURIComponent(hiraganaPassword)).replace(/[^a-zA-Z0-9]/g, "") + "X9!";
        }

        const colorPalette = [
            { name: "aka", hex: "#ef5350" },    
            { name: "pinku", hex: "#f48fb1" },  
            { name: "daidai", hex: "#ffb74d" }, 
            { name: "kiiro", hex: "#fff176" },  
            { name: "midori", hex: "#81c784" }, 
            { name: "mizu", hex: "#4fc3f7" },   
            { name: "ao", hex: "#64b5f6" },     
            { name: "murasaki", hex: "#ba68c8" },
            { name: "cha", hex: "#a1887f" },    
            { name: "siro", hex: "#e0e0e0" },   
            { name: "hai", hex: "#90a4ae" },    
            { name: "kuro", hex: "#37474f" }    
        ];

        let selectedRegisterColor = "";
        let selectedForgotColor = "";

        function initFormElements() {
            setupDateDropdowns('regMonth', 'regDay');
            setupDateDropdowns('forgotMonth', 'forgotDay');
            createColorGrid('regColorGrid', 'reg');
            createColorGrid('forgotColorGrid', 'forgot');
        }

        function setupDateDropdowns(monthId, dayId) {
            const monthSelect = document.getElementById(monthId);
            const daySelect = document.getElementById(dayId);
            monthSelect.innerHTML = '<option value="">-- 月 --</option>';
            for (let m = 1; m <= 12; m++) { monthSelect.innerHTML += `<option value="${m}">${m}月</option>`; }
            daySelect.innerHTML = '<option value="">-- 日 --</option>';
            for (let d = 1; d <= 31; d++) { daySelect.innerHTML += `<option value="${d}">${d}日</option>`; }
        }

        function createColorGrid(gridId, mode) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = "";
            colorPalette.forEach(color => {
                const circle = document.createElement('div');
                circle.className = 'color-circle';
                circle.style.backgroundColor = color.hex;
                circle.title = color.name;
                circle.onclick = () => selectColor(circle, color.name, mode);
                grid.appendChild(circle);
            });
        }

        function selectColor(element, colorName, mode) {
            const grid = element.parentElement;
            grid.querySelectorAll('.color-circle').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
            if (mode === 'reg') { selectedRegisterColor = colorName; } else { selectedForgotColor = colorName; }
        }

        function showBox(boxId) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('registerBox').classList.add('hidden');
            document.getElementById('forgotBox').classList.add('hidden');
            document.getElementById(boxId).classList.remove('hidden');
        }

        // 濁音・半濁音（が・ぱ等）もすべて入力できるように正規表現を修正
        function validateHiragana(input) {
            let value = input.value.replace(/[^ぁ-ん\u3099\u309A゛゜ー]/g, '');
            if (value.length > 10) { value = value.substring(0, 10); }
            input.value = value;
        }

        // 新規登録
        function register() {
            const name = document.getElementById('regName').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const month = document.getElementById('regMonth').value;
            const day = document.getElementById('regDay').value;
            const ansColor = selectedRegisterColor;

            if (!name || !password || !month || !day || !ansColor) {
                alert("ぜんぶ入力（選択）してね！");
                return;
            }

            const pseudoEmail = convertToEmail(name);
            const strongPassword = convertToStrongPassword(password);
            const birthdayStr = `${month}月${day}日`;

            auth.createUserWithEmailAndPassword(pseudoEmail, strongPassword)
                .then((userCredential) => {
                    const userId = userCredential.user.uid;
                    
                    database.ref('users/' + userId).set({
                        nickname: name,
                        pseudoEmail: pseudoEmail,
                        passwordHint: password, 
                        question1: birthdayStr,
                        question2: ansColor
                    }).then(() => {
                        alert("登録ができたよ！ログインしてみてね✨");
                        showBox('loginBox');
                        document.getElementById('loginName').value = name;
                        document.getElementById('loginPassword').value = password;
                    });
                })
                .catch((error) => {
                    if (error.code === "auth/email-already-in-use") {
                        alert("そのニックネームはすでに使われているよ💦");
                    } else {
                        alert("エラーが起きたよ💦\n理由: " + error.message);
                    }
                });
        }

        // ログイン
        function login() {
            const name = document.getElementById('loginName').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!name || !password) {
                alert("ニックネームと合言葉をいれてね！");
                return;
            }

            const pseudoEmail = convertToEmail(name);
            const strongPassword = convertToStrongPassword(password);

            auth.signInWithEmailAndPassword(pseudoEmail, strongPassword)
                .then((userCredential) => {
                    alert("ログイン大成功！");
                    sessionStorage.setItem('isLoggedIn', 'true');
                    window.location.href = "index.html";
                })
                .catch((error) => {
                    alert("ニックネームか合言葉がちがうみたい…💦");
                });
        }

        // あいことばを忘れたとき
        function checkAnswers() {
            const name = document.getElementById('forgotName').value.trim();
            const month = document.getElementById('forgotMonth').value;
            const day = document.getElementById('forgotDay').value;
            const forgotColor = selectedForgotColor;

            if (!name || !month || !day || !forgotColor) {
                alert("ぜんぶ入力（選択）してね！");
                return;
            }

            const pseudoEmail = convertToEmail(name);
            const birthdayStr = `${month}月${day}日`;

            database.ref('users').once('value').then((snapshot) => {
                let foundUserData = null;
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    if (data.pseudoEmail === pseudoEmail) {
                        foundUserData = data;
                    }
                });

                if (!foundUserData) {
                    alert("そのニックネームの人は見つからなかったよ💦");
                    return;
                }

                if (foundUserData.question1 === birthdayStr && 
                    foundUserData.question2 === forgotColor) {
                    
                    alert(`大正解！あなたのあいことばは【 ${foundUserData.passwordHint} 】だよ！`);
                    showBox('loginBox');
                    document.getElementById('loginPassword').value = foundUserData.passwordHint;
                } else {
                    alert("こたえがちがうみたいだよ…もういちど確かめてね💦");
                }
            });
        }

        initFormElements();
    </script>
</body>
</html>
