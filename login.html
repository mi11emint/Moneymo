<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - まねーも</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --main-color: #4fc3f7; 
            --bg-gradient: linear-gradient(to bottom, #4fc3f7, #e0f7fa);
            --text-color: #2c3e50;
        }

        body {
            margin: 0; padding: 20px 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 24px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { font-size: 20px; margin-bottom: 24px; font-weight: bold; }
        h2 { font-size: 15px; margin-top: 0; margin-bottom: 16px; color: #555; }

        .input-group {
            text-align: left;
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 6px;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            background: #f9f9f9;
        }
        input:focus, select:focus {
            border-color: var(--main-color);
            background: #fff;
        }

        /* 🔒 パターン認証用のキャンバスエリア */
        .pattern-holder {
            display: flex;
            justify-content: center;
            margin: 15px 0;
            position: relative;
        }
        .pattern-canvas {
            background: #f0faff;
            border: 2px dashed #b3e5fc;
            border-radius: 16px;
            touch-action: none; /* スマホのスクロールを防止 */
            cursor: pointer;
        }
        .pattern-status {
            font-size: 12px;
            font-weight: bold;
            color: #4fc3f7;
            margin-bottom: 10px;
            height: 18px;
        }

        .select-row {
            display: flex;
            gap: 8px;
        }
        .select-row select {
            flex: 1;
        }

        .color-picker-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-top: 6px;
        }
        .color-circle {
            width: 60%;
            margin: 0 auto;
            aspect-ratio: 1;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s, border-color 0.2s;
        }
        .color-circle:active { transform: scale(0.9); }
        .color-circle.selected {
            border-color: #2c3e50;
            transform: scale(1.05);
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
        }

        .hint-text {
            font-size: 11px;
            color: #777;
            margin-top: 4px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            color: white;
            background-color: var(--main-color);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(79, 195, 247, 0.3);
        }
        .btn:active { transform: scale(0.98); }
        .btn-secondary {
            background-color: transparent;
            color: var(--main-color);
            border: 1px solid var(--main-color);
            box-shadow: none;
            margin-top: 12px;
        }

        .toggle-link {
            font-size: 13px;
            color: var(--main-color);
            text-decoration: underline;
            cursor: pointer;
            display: inline-block;
            margin-top: 16px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="login-container" id="loginBox">
        <h1>まねーも</h1>
        
        <div class="input-group">
            <label for="loginName">ニックネーム</label>
            <input type="text" id="loginName" placeholder="登録したなまえ">
        </div>

        <div class="input-group">
            <label>ひみつのパターン（点を指でなぞってね）</label>
            <div class="pattern-status" id="loginStatus">なぞりはじめてね</div>
            <div class="pattern-holder">
                <canvas id="loginCanvas" class="pattern-canvas" width="260" height="260"></canvas>
            </div>
        </div>

        <button class="btn" onclick="login()">ログインする 🔑</button>
        
        <div>
            <span class="toggle-link" onclick="showBox('registerBox')">はじめてつかう（新しく登録）</span>
        </div>
        <div>
            <span class="toggle-link" onclick="showBox('forgotBox')">ひみつのパターンを忘れたとき</span>
        </div>
    </div>

    <div class="login-container hidden" id="registerBox">
        <h1>新しくパターンをきめる</h1>
        
        <div class="input-group">
            <label for="regName">ニックネーム</label>
            <input type="text" id="regName" placeholder="あなたのなまえ">
        </div>

        <div class="input-group">
            <label>ひみつのパターン（4つ以上の点をつないでね）</label>
            <div class="pattern-status" id="regStatus">4つ以上の点をつないでね</div>
            <div class="pattern-holder">
                <canvas id="regCanvas" class="pattern-canvas" width="260" height="260"></canvas>
            </div>
            <div class="hint-text">※忘れないように、なぞった形を覚えておいてね！</div>
        </div>

        <hr style="border: 0; border-top: 1px dashed #ccc; margin: 20px 0;">
        <h2>わすれたときのための質問</h2>

        <div class="input-group">
            <label>① 誕生日は？</label>
            <div class="select-row">
                <select id="regMonth"></select>
                <select id="regDay"></select>
            </div>
        </div>

        <div class="input-group">
            <label>② 好きな色は？</label>
            <div class="color-picker-grid" id="regColorGrid"></div>
        </div>

        <button class="btn" onclick="register()">これで登録する ✨</button>
        <button class="btn btn-secondary" onclick="showBox('loginBox')">もどる</button>
    </div>

    <div class="login-container hidden" id="forgotBox">
        <h1>パターンの確認</h1>
        <p style="font-size: 13px; color: #555;">登録したニックネームと、質問にこたえてね</p>
        
        <div class="input-group">
            <label for="forgotName">ニックネーム</label>
            <input type="text" id="forgotName" placeholder="あなたのなまえ">
        </div>

        <div class="input-group">
            <label>① 誕生日は？</label>
            <div class="select-row">
                <select id="forgotMonth"></select>
                <select id="forgotDay"></select>
            </div>
        </div>

        <div class="input-group">
            <label>② 好きな色は？</label>
            <div class="color-picker-grid" id="forgotColorGrid"></div>
        </div>

        <button class="btn" onclick="checkAnswers()">パターン（番号）をチェックする 🔍</button>
        <button class="btn btn-secondary" onclick="showBox('loginBox')">もどる</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyIWeWtEPx4j1BOUczqao1tUPuVR2pgtY",
            authDomain: "moneymo-3c572.firebaseapp.com",
            databaseURL: "https://moneymo-3c572-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "moneymo-3c572",
            storageBucket: "moneymo-3c572.firebasestorage.app",
            messagingSenderId: "1040579264053",
            appId: "1:1040579264053:web:d3de60f3e7438c44aa3b7c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        function convertToEmail(name) {
            return encodeURIComponent(name) + "@moneymo.internal";
        }

        function makeFirebasePassword(patternCode) {
            return patternCode + "_patternAuth777";
        }

        // 🎨 --- パターンロックのプログラム制御クラス ---
        class PatternLock {
            constructor(canvasId, statusId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.statusEl = document.getElementById(statusId);
                this.points = [];
                this.selectedPoints = [];
                this.isDrawing = false;
                this.currentPos = { x: 0, y: 0 };
                this.initPoints();
                this.initEvents();
                this.draw();
            }

            initPoints() {
                const size = 260;
                const spacing = size / 4;
                this.points = [];
                let id = 1;
                for (let row = 0; row < 3; row++) {
                    for (let col = 0; col < 3; col++) {
                        this.points.push({
                            id: id++,
                            x: spacing * (col + 1),
                            y: spacing * (row + 1),
                            radius: 12
                        });
                    }
                }
            }

            initEvents() {
                const getPos = (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    return { x: clientX - rect.left, y: clientY - rect.top };
                };

                const start = (e) => {
                    e.preventDefault();
                    this.isDrawing = true;
                    this.selectedPoints = [];
                    this.currentPos = getPos(e);
                    this.checkCollision(this.currentPos);
                    this.draw();
                };

                const move = (e) => {
                    if (!this.isDrawing) return;
                    e.preventDefault();
                    this.currentPos = getPos(e);
                    this.checkCollision(this.currentPos);
                    this.draw();
                };

                const end = () => {
                    if (!this.isDrawing) return;
                    this.isDrawing = false;
                    this.draw();
                    if (this.selectedPoints.length > 0) {
                        const code = this.getPatternCode();
                        this.statusEl.innerText = `なぞり終わりました！ (繋いだ数: ${this.selectedPoints.length})`;
                    }
                };

                this.canvas.addEventListener('mousedown', start);
                this.canvas.addEventListener('mousemove', move);
                window.addEventListener('mouseup', end);
                this.canvas.addEventListener('touchstart', start, { passive: false });
                this.canvas.addEventListener('touchmove', move, { passive: false });
                window.addEventListener('touchend', end);
            }

            checkCollision(pos) {
                for (let p of this.points) {
                    const dist = Math.hypot(p.x - pos.x, p.y - pos.y);
                    if (dist < p.radius + 15) { // 少し判定を広めに
                        if (!this.selectedPoints.includes(p)) {
                            this.selectedPoints.push(p);
                            this.statusEl.innerText = "なぞっています...";
                        }
                        break;
                    }
                }
            }

            getPatternCode() {
                return this.selectedPoints.map(p => p.id).join('');
            }

            clear() {
                this.selectedPoints = [];
                this.isDrawing = false;
                this.statusEl.innerText = "点をつないでね";
                this.draw();
            }

            draw() {
                this.ctx.clearRect(0, 0, 260, 260);

                // 線を描画
                if (this.selectedPoints.length > 0) {
                    this.ctx.beginPath();
                    this.ctx.strokeStyle = '#4fc3f7';
                    this.ctx.lineWidth = 6;
                    this.ctx.lineCap = 'round';
                    this.ctx.lineJoin = 'round';
                    this.ctx.moveTo(this.selectedPoints[0].x, this.selectedPoints[0].y);
                    for (let i = 1; i < this.selectedPoints.length; i++) {
                        this.ctx.lineTo(this.selectedPoints[i].x, this.selectedPoints[i].y);
                    }
                    if (this.isDrawing) {
                        this.ctx.lineTo(this.currentPos.x, this.currentPos.y);
                    }
                    this.ctx.stroke();
                }

                // 点（ドット）を描画
                this.points.forEach(p => {
                    const isSelected = this.selectedPoints.includes(p);
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    this.ctx.fillStyle = isSelected ? '#4fc3f7' : '#b0bec5';
                    this.ctx.fill();

                    // 選択された点の中心にさらに小さな点を重ねる
                    if (isSelected) {
                        this.ctx.beginPath();
                        this.ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                        this.ctx.fillStyle = '#ffffff';
                        this.ctx.fill();
                    }
                });
            }
        }

        // フォーム用変数とカラーパレット
        let regLock, loginLock;
        const colorPalette = [
            { name: "aka", hex: "#ef5350" }, { name: "pinku", hex: "#f48fb1" },  
            { name: "daidai", hex: "#ffb74d" }, { name: "kiiro", hex: "#fff176" },  
            { name: "midori", hex: "#81c784" }, { name: "mizu", hex: "#4fc3f7" },   
            { name: "ao", hex: "#64b5f6" }, { name: "murasaki", hex: "#ba68c8" },
            { name: "cha", hex: "#a1887f" }, { name: "siro", hex: "#e0e0e0" },   
            { name: "hai", hex: "#90a4ae" }, { name: "kuro", hex: "#37474f" }    
        ];

        let selectedRegisterColor = "";
        let selectedForgotColor = "";

        function initFormElements() {
            setupDateDropdowns('regMonth', 'regDay');
            setupDateDropdowns('forgotMonth', 'forgotDay');
            createColorGrid('regColorGrid', 'reg');
            createColorGrid('forgotColorGrid', 'forgot');
            
            // キャンバスコントロールを起動
            loginLock = new PatternLock('loginCanvas', 'loginStatus');
            regLock = new PatternLock('regCanvas', 'regStatus');
        }

        function setupDateDropdowns(monthId, dayId) {
            const monthSelect = document.getElementById(monthId);
            const daySelect = document.getElementById(dayId);
            monthSelect.innerHTML = '<option value="">-- 月 --</option>';
            for (let m = 1; m <= 12; m++) { monthSelect.innerHTML += `<option value="${m}">${m}月</option>`; }
            daySelect.innerHTML = '<option value="">-- 日 --</option>';
            for (let d = 1; d <= 31; d++) { daySelect.innerHTML += `<option value="${d}">${d}日</option>`; }
        }

        function createColorGrid(gridId, mode) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = "";
            colorPalette.forEach(color => {
                const circle = document.createElement('div');
                circle.className = 'color-circle';
                circle.style.backgroundColor = color.hex;
                circle.title = color.name;
                circle.onclick = () => selectColor(circle, color.name, mode);
                grid.appendChild(circle);
            });
        }

        function selectColor(element, colorName, mode) {
            const grid = element.parentElement;
            grid.querySelectorAll('.color-circle').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
            if (mode === 'reg') { selectedRegisterColor = colorName; } else { selectedForgotColor = colorName; }
        }

        function showBox(boxId) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('registerBox').classList.add('hidden');
            document.getElementById('forgotBox').classList.add('hidden');
            document.getElementById(boxId).classList.remove('hidden');
            
            // 切り替えた時に描画キャンバスをリセット
            if(boxId === 'loginBox') loginLock.clear();
            if(boxId === 'registerBox') regLock.clear();
        }

        // 新規登録
        function register() {
            const name = document.getElementById('regName').value.trim();
            const patternCode = regLock.getPatternCode();
            const month = document.getElementById('regMonth').value;
            const day = document.getElementById('regDay').value;
            const ansColor = selectedRegisterColor;

            if (!name || !month || !day || !ansColor) {
                alert("ニックネームと質問の答えを入力・選択してね！");
                return;
            }

            if (patternCode.length < 4) {
                alert("パターンは安全のために【点を4つ以上】つないでね！");
                return;
            }

            const pseudoEmail = convertToEmail(name);
            const firebasePassword = makeFirebasePassword(patternCode);
            const birthdayStr = `${month}月${day}日`;

            auth.createUserWithEmailAndPassword(pseudoEmail, firebasePassword)
                .then((userCredential) => {
                    const userId = userCredential.user.uid;
                    
                    database.ref('users/' + userId).set({
                        nickname: name,
                        pseudoEmail: pseudoEmail,
                        passwordHint: `パターンコード: ${patternCode}`, 
                        question1: birthdayStr,
                        question2: ansColor
                    }).then(() => {
                        alert("登録ができたよ！同じ形でなぞってログインしてみてね✨");
                        showBox('loginBox');
                        document.getElementById('loginName').value = name;
                    });
                })
                .catch((error) => {
                    if (error.code === "auth/email-already-in-use") {
                        alert("そのニックネームはすでに使われているよ💦");
                    } else {
                        alert("エラーが起きたよ💦\n理由: " + error.message);
                    }
                });
        }

        // ログイン
        function login() {
            const name = document.getElementById('loginName').value.trim();
            const patternCode = loginLock.getPatternCode();

            if (!name) {
                alert("ニックネームをいれてね！");
                return;
            }
            if (patternCode.length === 0) {
                alert("ひみつのパターンをなぞってね！");
                return;
            }

            const pseudoEmail = convertToEmail(name);
            const firebasePassword = makeFirebasePassword(patternCode);

            auth.signInWithEmailAndPassword(pseudoEmail, firebasePassword)
                .then((userCredential) => {
                    alert("ログイン大成功！");
                    sessionStorage.setItem('isLoggedIn', 'true');
                    window.location.href = "index.html";
                })
                .catch((error) => {
                    alert("なまえか、なぞった形がちがうみたい…💦");
                    loginLock.clear(); // 失敗したらリセット
                });
        }

        // パターン（ヒント）を確認するとき
        function checkAnswers() {
            const name = document.getElementById('forgotName').value.trim();
            const month = document.getElementById('forgotMonth').value;
            const day = document.getElementById('forgotDay').value;
            const forgotColor = selectedForgotColor;

            if (!name || !month || !day || !forgotColor) {
                alert("ぜんぶ入力（選択）してね！");
                return;
            }

            const pseudoEmail = convertToEmail(name);
            const birthdayStr = `${month}月${day}日`;

            database.ref('users').once('value').then((snapshot) => {
                let foundUserData = null;
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    if (data.pseudoEmail === pseudoEmail) {
                        foundUserData = data;
                    }
                });

                if (!foundUserData) {
                    alert("そのニックネームの人は見つからなかったよ💦");
                    return;
                }

                if (foundUserData.question1 === birthdayStr && 
                    foundUserData.question2 === forgotColor) {
                    
                    alert(`大正解！あなたの登録データ：\n【 ${foundUserData.passwordHint} 】\n※左上から右へ 1, 2, 3... の順のドット番号だよ！`);
                    showBox('loginBox');
                } else {
                    alert("こたえがちがうみたいだよ…もういちど確かめてね💦");
                }
            });
        }

        initFormElements();
    </script>
</body>
</html>
